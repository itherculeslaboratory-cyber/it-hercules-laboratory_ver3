<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>利用規約 — After案モック(round2)</title>
<link rel="stylesheet" href="../assets/theme.css">
</head>
<body>
<div class="civ-app-shell">
  <header class="civ-chrome-header">
    <a class="civ-brand" href="#">IHL</a>
    <nav class="civ-chrome-nav">
      <a class="civ-chrome-link" href="#">観測対象を探す</a>
      <a class="civ-chrome-link" href="#">マイページ</a>
      <a class="civ-chrome-link" href="#">通知</a>
      <a class="civ-chrome-link" href="#">設定</a>
    </nav>
    <div class="civ-chrome-auth"><a class="civ-chrome-link" href="#">ログアウト</a></div>
  </header>

  <main class="civ-page">
    <h1 class="civ-heading">利用規約</h1>

    <div class="civ-tab-list" role="tablist">
      <button class="civ-interactive civ-tab" data-active="true" role="tab" aria-selected="true">わかりやすい版</button>
      <button class="civ-interactive civ-tab" role="tab">正式版</button>
    </div>

    <div class="civ-tab-panel" role="tabpanel">
      <a class="civ-link" href="#">🎬 解説動画を見る(3分)</a>

      <div class="civ-card">
        <span class="civ-text">観測データの扱い</span>
        <span class="civ-text" data-muted="true">あなたが登録した観測データは、あなたの許可なく販売されません。</span>
      </div>
      <div class="civ-card">
        <span class="civ-text">禁止行為</span>
        <span class="civ-text" data-muted="true">なりすまし・虚偽の出品・個人間送金アプリでの取引などは禁止です。</span>
      </div>
      <div class="civ-card">
        <span class="civ-text">コミュニティのルール</span>
        <span class="civ-text" data-muted="true">話し合いの場で解決しない場合は、公開して投票にかけられます。</span>
      </div>
    </div>

    <button class="civ-interactive civ-button" data-variant="primary" type="button">同意して始める</button>

    <p class="mock-sample-tag">サンプル・わかりやすい版⇔正式版タブ、同意ボタンは両タブ共通下部、動画導線は設定にURLがある時だけ表示</p>
  </main>

  <footer class="civ-chrome-footer">
    <span class="mock-sample-tag">UI再設計round2 After案モック — terms</span>
  </footer>
</div>
</body>
</html>
