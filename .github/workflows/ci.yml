name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # frozen-diff / design-gate steps need the base commit

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: npm install

      - name: Lint (filenames / generated / agents-sync / schemas / frontmatter / codegen-check / rtm-closure)
        run: npm run lint

      - name: Test (apps/api + tests + apps/web)
        run: npm test

      # Python pipeline TC (V3-AIP-22). components/*/tests only — .venv is deeper
      # than */tests so the glob excludes it. Heavy parity deps (torch/onnx) are
      # component-venv-only; those TC importorskip cleanly here.
      - name: Python tests (components — .venv excluded)
        run: |
          python -m pip install --upgrade pip pytest numpy cryptography polars
          PYTHONIOENCODING=utf-8 python -m pytest -q components/*/tests

      - name: Build web (V3-AIP-22)
        run: npm run build -w apps/web

      - name: Typecheck web (V3-AIP-22)
        run: npm run typecheck -w apps/web

      # PR-only: if schemas/frozen/ changed, tests/ MUST change too (CL-01..13 形式凍結 — 要件定義書 §6.3).
      - name: Frozen schema change gate
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head")
          frozen=$(echo "$changed" | grep '^schemas/frozen/' || true)
          if [ -n "$frozen" ]; then
            echo "schemas/frozen/ changed in this PR:"
            echo "$frozen"
            tests=$(echo "$changed" | grep '^tests/' || true)
            if [ -z "$tests" ]; then
              echo "::error::schemas/frozen/ changed but no tests/ changes — CL negative TC 緑化が必須です (§6.3)."
              exit 1
            fi
            echo "tests/ also changed — OK."
          else
            echo "No schemas/frozen/ changes — gate not applicable."
          fi

      # PR-only design gates (V3-AIP-32/36/68): requirement-freeze (裁定参照必須),
      # commit-message discipline (BASELINE_REF 未設定の間は no-op), dangerous-code
      # classifier (money/DNS/self-permission — staging 昇格の物理ゲート・§5).
      # check-rtm は npm run lint 内で実行。
      - name: Design gate (req-freeze / commit-msg / danger-code)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          node scripts/check-req-freeze.mjs
          node scripts/check-commit-msg.mjs
          node scripts/check-danger-code.mjs
