name = "ihl-api-ver3"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# アカウント ID・ルート・シークレット等の実値は wrangler secret / ダッシュボード /
# ローカル .env で管理し、本ファイルにはコミットしない（.env.example の型のみが正本）。
# DEV_TOKEN（C1 の認証スタンドイン）も wrangler secret で投入し、ここに値を書かない。

# Truth バケット（append-only・put-if-absent は storage 層で強制 —
# docs/planning/c1/r2-put-if-absent-evidence.md）
[[r2_buckets]]
binding = "TRUTH"
bucket_name = "ihl-ver3-truth-dev"

# C5 K3 月次経済 cron（design-k3 §2.6 / V3-KRM-03/11/12・V3-MKT-04/10）。日次起動
# "0 15 * * *"（UTC15:00 = JST0:00）を handleScheduled が受け、毎月 25 日基準で月次処理。
# V3-SEC-52 unconsented-cron GATE の承認は config/consented-crons.json（human consent
# artifact）。デプロイ = 実行開始 = 常駐トークン消費 = 人間ゲート（本波は配線 + GATE 緑まで）。
[triggers]
crons = ["0 15 * * *"]

# ── [env.staging]（V3-AIP-68 staging 昇格先）─────────────────────────────
# 10 人規模レビュー・約 1 ヶ月試験運用の受け皿。workers.dev の dev サブドメインのみ
# 露出し、本番 route/カスタムドメインはここに書かない（公開 = 人間ゲート）。dev バケットを
# 共有（本番 Truth に触れない）。cron は継承しない（staging で常駐トークンを焼かない）。
# 実 deploy（wrangler deploy --env staging）と dev worker への secret 投入は対外操作 —
# 配線のみ本波・実行はコーディネータ/人間ゲート（設計 §5 / 危険操作の扱い）。
[env.staging]
name = "ihl-api-ver3-staging"
workers_dev = true

# トップレベル [triggers] は env に継承されるため、staging では空配列で明示上書きし
# cron を無効化する(cron の実稼働開始 = 常駐実行 = 人間ゲート。2026-07-11 初回デプロイで
# 継承に気づき即時無効化 — 経緯は REPORT-ver3-phase-c6 §停止報告)。
[env.staging.triggers]
crons = []

[[env.staging.r2_buckets]]
binding = "TRUTH"
bucket_name = "ihl-ver3-truth-dev"
